<div class="accent-bar"></div>
<nav class="h-16 bg-nav border-b border-nav-border flex items-center justify-between px-6">
  <a routerLink="/dashboard">
    <img src="images/logos-white.svg" alt="Seventh Sense" class="h-7" />
  </a>
  <div class="flex items-center gap-3">
    <!-- Theme toggle -->
    <button (click)="theme.toggle()"
            class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center text-white/60 hover:text-gold transition">
      @if (theme.theme() === 'light') {
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path stroke-linecap="round" d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      }
    </button>
    <!-- User dropdown -->
    <div class="relative">
      <button (click)="toggleDropdown()"
              class="w-9 h-9 rounded-full bg-gradient-to-br from-brand to-gold text-white text-sm font-bold flex items-center justify-center">
        {{ auth.user()?.full_name?.charAt(0) || 'U' }}
      </button>
      @if (dropdownOpen) {
        <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-zinc-200 py-2 z-50
                    [body[data-theme=dark]_&]:bg-dark-elevated [body[data-theme=dark]_&]:border-zinc-700">
          <a routerLink="/dashboard/profile" (click)="dropdownOpen = false"
             class="block px-4 py-2 text-sm text-zinc-700 hover:bg-zinc-50
                    [body[data-theme=dark]_&]:text-zinc-300 [body[data-theme=dark]_&]:hover:bg-dark-card">Profile</a>
          <button (click)="logout()"
                  class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-zinc-50
                         [body[data-theme=dark]_&]:hover:bg-dark-card">Sign Out</button>
        </div>
      }
    </div>
  </div>
</nav>
