<div class="max-w-xl">
  <h2 class="font-heading text-2xl font-bold text-zinc-900 mb-6 [body[data-theme=dark]_&]:text-white">Profile</h2>

  <!-- User card -->
  <div class="flex items-center gap-4 p-5 bg-white border border-zinc-200 rounded-2xl mb-6
              [body[data-theme=dark]_&]:bg-dark-elevated [body[data-theme=dark]_&]:border-zinc-800">
    <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-brand to-gold text-white text-xl font-bold flex items-center justify-center shrink-0">
      {{ auth.user()?.full_name?.charAt(0) || 'U' }}
    </div>
    <div>
      <p class="font-heading font-semibold text-lg text-zinc-900 [body[data-theme=dark]_&]:text-white">{{ auth.user()?.full_name }}</p>
      <p class="text-sm text-zinc-400">{{ auth.user()?.email }}</p>
    </div>
  </div>

  @if (message()) {
    <div class="bg-green-50 text-green-700 px-4 py-3 rounded-xl text-sm mb-5 border border-green-200
                [body[data-theme=dark]_&]:bg-green-900/15 [body[data-theme=dark]_&]:text-green-400 [body[data-theme=dark]_&]:border-green-800/30">
      {{ message() }}
    </div>
  }

  <!-- Edit form -->
  <div class="bg-white border border-zinc-200 rounded-2xl p-6
              [body[data-theme=dark]_&]:bg-dark-elevated [body[data-theme=dark]_&]:border-zinc-800">
    <form (ngSubmit)="save()">
      <div class="mb-4">
        <label for="profile-name" class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Full Name</label>
        <input id="profile-name" type="text" [(ngModel)]="fullName" name="fullName" class="input" />
      </div>
      <div class="mb-4">
        <label for="profile-company" class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Company</label>
        <input id="profile-company" type="text" [(ngModel)]="company" name="company" class="input" placeholder="Your company" />
      </div>
      <div class="mb-6">
        <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Email</label>
        <input type="email" [value]="auth.user()?.email" disabled class="input opacity-50 cursor-not-allowed" />
      </div>
      <button type="submit" class="btn-gradient text-xs" [disabled]="loading()">
        {{ loading() ? 'Saving...' : 'Save Changes' }}
      </button>
    </form>
  </div>
</div>
