<div class="min-h-screen flex items-center justify-center bg-zinc-50 [body[data-theme=dark]_&]:bg-dark">
  <div class="text-center max-w-md mx-auto px-6">
    @if (status() === 'verifying') {
      <div class="w-12 h-12 border-4 border-brand border-t-transparent rounded-full animate-spin mx-auto mb-5"></div>
      <h1 class="font-heading text-xl font-bold text-zinc-900 mb-2 [body[data-theme=dark]_&]:text-white">Verifying your email...</h1>
      <p class="text-sm text-zinc-500">Please wait a moment.</p>
    }
    @if (status() === 'success') {
      <div class="w-16 h-16 rounded-full bg-green-100 text-green-600 flex items-center justify-center mx-auto mb-5 text-2xl
                  [body[data-theme=dark]_&]:bg-green-900/20 [body[data-theme=dark]_&]:text-green-400">&#10003;</div>
      <h1 class="font-heading text-xl font-bold text-zinc-900 mb-2 [body[data-theme=dark]_&]:text-white">Email Verified!</h1>
      <p class="text-sm text-zinc-500">Redirecting to your dashboard...</p>
    }
    @if (status() === 'error') {
      <div class="w-16 h-16 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-5 text-2xl
                  [body[data-theme=dark]_&]:bg-red-900/20 [body[data-theme=dark]_&]:text-red-400">&times;</div>
      <h1 class="font-heading text-xl font-bold text-zinc-900 mb-2 [body[data-theme=dark]_&]:text-white">Verification Failed</h1>
      <p class="text-sm text-zinc-500">{{ errorMessage() }}</p>
    }
  </div>
</div>
