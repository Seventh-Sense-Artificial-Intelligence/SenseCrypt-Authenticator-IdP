<div class="max-w-5xl animate-on-load">
  <!-- Welcome banner -->
  <div class="relative overflow-hidden rounded-2xl p-7 lg:p-9 mb-6 border border-white/10" style="background: linear-gradient(135deg, #B3231D 0%, #8B1A15 40%, #1A1A2E 100%);">
    <img src="images/network2.png" class="absolute inset-0 w-full h-full object-cover opacity-[0.07] pointer-events-none" alt="" />
    <div class="relative z-10">
      <p class="text-white/50 text-xs font-semibold uppercase tracking-widest mb-2">Dashboard</p>
      <h1 class="font-display text-2xl font-bold text-white mb-1.5">Welcome back, {{ auth.user()?.full_name || 'User' }}</h1>
      <p class="text-white/55 text-sm">Manage your authentication settings and monitor activity.</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 animate-on-load delay-100">
    <div class="bg-white dark:bg-surface-dark-elevated border border-border-light dark:border-border-dark rounded-2xl p-5">
      <p class="text-xs font-semibold uppercase tracking-wider text-muted mb-3">Authentications</p>
      <p class="font-display text-3xl font-bold text-body dark:text-white">0</p>
      <p class="text-xs text-muted mt-1">Today</p>
    </div>
    <div class="bg-white dark:bg-surface-dark-elevated border border-border-light dark:border-border-dark rounded-2xl p-5">
      <p class="text-xs font-semibold uppercase tracking-wider text-muted mb-3">Devices</p>
      <p class="font-display text-3xl font-bold text-body dark:text-white">0</p>
      <p class="text-xs text-muted mt-1">Registered</p>
    </div>
    <div class="bg-white dark:bg-surface-dark-elevated border border-border-light dark:border-border-dark rounded-2xl p-5">
      <p class="text-xs font-semibold uppercase tracking-wider text-muted mb-3">Status</p>
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-green-500"></div>
        <p class="font-display text-lg font-bold text-body dark:text-white">Active</p>
      </div>
      <p class="text-xs text-muted mt-1">Account verified</p>
    </div>
    <div class="bg-white dark:bg-surface-dark-elevated border border-border-light dark:border-border-dark rounded-2xl p-5">
      <p class="text-xs font-semibold uppercase tracking-wider text-muted mb-3">Failed Attempts</p>
      <p class="font-display text-3xl font-bold text-body dark:text-white">0</p>
      <p class="text-xs text-muted mt-1">Last 30 days</p>
    </div>
  </div>
</div>
