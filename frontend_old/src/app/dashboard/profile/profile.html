<div class="max-w-xl animate-on-load">
  <h2 class="font-display text-2xl font-bold text-body dark:text-white mb-6">Profile</h2>

  <!-- User card -->
  <div class="flex items-center gap-4 p-5 bg-white dark:bg-surface-dark-elevated border border-border-light dark:border-border-dark rounded-2xl mb-6">
    <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-brand-red to-brand-gold text-white text-xl font-bold flex items-center justify-center shrink-0">
      {{ auth.user()?.full_name?.charAt(0) || 'U' }}
    </div>
    <div>
      <p class="font-display font-semibold text-lg text-body dark:text-white">{{ auth.user()?.full_name }}</p>
      <p class="text-sm text-muted">{{ auth.user()?.email }}</p>
    </div>
  </div>

  @if (message()) {
    <div class="bg-green-50 dark:bg-green-900/15 text-green-700 dark:text-green-400 px-4 py-3 rounded-xl text-sm mb-5 border border-green-200 dark:border-green-800/30">{{ message() }}</div>
  }

  <!-- Edit form -->
  <div class="bg-white dark:bg-surface-dark-elevated border border-border-light dark:border-border-dark rounded-2xl p-6">
    <form (ngSubmit)="save()">
      <div class="mb-4">
        <label for="profile-name" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Full Name</label>
        <input id="profile-name" type="text" [(ngModel)]="fullName" name="fullName" class="form-input" />
      </div>
      <div class="mb-6">
        <label class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Email</label>
        <input type="email" [value]="auth.user()?.email" disabled class="form-input opacity-50 cursor-not-allowed" />
      </div>
      <button type="submit" class="btn-cta !py-2.5 !px-6 !text-xs" [disabled]="loading()">
        {{ loading() ? 'Saving...' : 'Save Changes' }}
      </button>
    </form>
  </div>
</div>
