<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-panel">
    <button class="absolute top-5 right-5 w-8 h-8 flex items-center justify-center rounded-full text-muted hover:text-body dark:hover:text-white hover:bg-surface dark:hover:bg-surface-dark transition-colors text-lg" (click)="close.emit()">&times;</button>

    @if (step() === 'register') {
      <div class="w-2 h-2 rounded-full bg-gradient-to-r from-brand-red to-brand-gold mb-5"></div>
      <h2 class="font-display text-xl font-bold text-body dark:text-white mb-1">Create account</h2>
      <p class="text-muted text-sm mb-7">Start your passwordless journey</p>

      @if (error()) {
        <div class="bg-brand-red/5 dark:bg-brand-red/10 text-brand-red dark:text-brand-red-light px-4 py-3 rounded-xl text-sm mb-5 border border-brand-red/10">{{ error() }}</div>
      }

      <form (ngSubmit)="onRegister()">
        <div class="mb-4">
          <label for="reg-name" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Full Name</label>
          <input id="reg-name" type="text" [(ngModel)]="fullName" name="fullName" placeholder="Jane Doe" required class="form-input" />
        </div>
        <div class="mb-4">
          <label for="reg-email" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Email</label>
          <input id="reg-email" type="email" [(ngModel)]="email" name="email" placeholder="you@company.com" required class="form-input" />
        </div>
        <div class="mb-4">
          <label for="reg-password" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Password</label>
          <input id="reg-password" type="password" [(ngModel)]="password" name="password" placeholder="Create a password" required class="form-input" />
        </div>
        <div class="mb-6">
          <label for="reg-confirm" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Confirm Password</label>
          <input id="reg-confirm" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required class="form-input" />
        </div>
        <button type="submit" class="btn-cta w-full !py-3" [disabled]="loading()">
          {{ loading() ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>

      <p class="text-center mt-6 text-sm text-muted">
        Already have an account?
        <button class="text-brand-red dark:text-brand-red-light font-semibold hover:underline" (click)="switchToLogin.emit()">Sign in</button>
      </p>
    }

    @if (step() === 'email-sent') {
      <div class="text-center py-6">
        <div class="w-16 h-16 mx-auto mb-5 rounded-2xl bg-surface dark:bg-surface-dark flex items-center justify-center border border-border-light dark:border-border-dark">
          <span class="text-3xl">&#9993;</span>
        </div>
        <h2 class="font-display text-xl font-bold text-body dark:text-white mb-2">Check your email</h2>
        <p class="text-muted text-sm leading-relaxed mb-8 max-w-[280px] mx-auto">
          We sent a verification link to <span class="font-semibold text-body dark:text-white">{{ email }}</span>. Click the button in the email to continue.
        </p>
        <button class="btn-outline-pill w-full !py-3" (click)="close.emit()">Done</button>
      </div>
    }
  </div>
</div>
