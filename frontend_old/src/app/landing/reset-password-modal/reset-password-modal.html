<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-panel">
    <button class="absolute top-5 right-5 w-8 h-8 flex items-center justify-center rounded-full text-muted hover:text-body dark:hover:text-white hover:bg-surface dark:hover:bg-surface-dark transition-colors text-lg" (click)="close.emit()">&times;</button>

    @if (!success()) {
      <div class="w-2 h-2 rounded-full bg-gradient-to-r from-brand-red to-brand-gold mb-5"></div>
      <h2 class="font-display text-xl font-bold text-body dark:text-white mb-1">Set new password</h2>
      <p class="text-muted text-sm mb-7">Choose a strong, unique password</p>

      @if (error()) {
        <div class="bg-brand-red/5 dark:bg-brand-red/10 text-brand-red dark:text-brand-red-light px-4 py-3 rounded-xl text-sm mb-5 border border-brand-red/10">{{ error() }}</div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label for="new-password" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">New Password</label>
          <input id="new-password" type="password" [(ngModel)]="password" name="password" placeholder="Enter new password" required class="form-input" />
        </div>
        <div class="mb-6">
          <label for="confirm-password" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Confirm Password</label>
          <input id="confirm-password" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required class="form-input" />
        </div>
        <button type="submit" class="btn-cta w-full !py-3" [disabled]="loading()">
          {{ loading() ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>
    } @else {
      <div class="text-center py-6">
        <div class="w-16 h-16 mx-auto mb-5 rounded-2xl bg-green-50 dark:bg-green-900/15 flex items-center justify-center border border-green-200 dark:border-green-800/30">
          <span class="text-3xl text-green-600 dark:text-green-400">&#10003;</span>
        </div>
        <h2 class="font-display text-xl font-bold text-body dark:text-white mb-2">Password updated</h2>
        <p class="text-muted text-sm mb-8">Your password has been reset successfully.</p>
        <button class="btn-cta w-full !py-3" (click)="switchToLogin.emit()">Sign In</button>
      </div>
    }
  </div>
</div>
