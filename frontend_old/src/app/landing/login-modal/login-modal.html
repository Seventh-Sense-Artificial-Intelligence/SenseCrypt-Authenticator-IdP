<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-panel">
    <!-- Close -->
    <button class="absolute top-5 right-5 w-8 h-8 flex items-center justify-center rounded-full text-muted hover:text-body dark:hover:text-white hover:bg-surface dark:hover:bg-surface-dark transition-colors text-lg" (click)="close.emit()">&times;</button>

    @if (!showForgot()) {
      <!-- Accent dot -->
      <div class="w-2 h-2 rounded-full bg-gradient-to-r from-brand-red to-brand-gold mb-5"></div>
      <h2 class="font-display text-xl font-bold text-body dark:text-white mb-1">Welcome back</h2>
      <p class="text-muted text-sm mb-7">Sign in to your account</p>

      @if (error()) {
        <div class="bg-brand-red/5 dark:bg-brand-red/10 text-brand-red dark:text-brand-red-light px-4 py-3 rounded-xl text-sm mb-5 border border-brand-red/10">{{ error() }}</div>
      }

      <form (ngSubmit)="onLogin()">
        <div class="mb-4">
          <label for="login-email" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Email</label>
          <input id="login-email" type="email" [(ngModel)]="email" name="email" placeholder="you@company.com" required class="form-input" />
        </div>
        <div class="mb-3">
          <label for="login-password" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Password</label>
          <input id="login-password" type="password" [(ngModel)]="password" name="password" placeholder="Your password" required class="form-input" />
        </div>
        <button type="button" class="block w-full text-right text-xs text-brand-red dark:text-brand-red-light font-medium mb-5 hover:underline" (click)="showForgot.set(true)">Forgot password?</button>
        <button type="submit" class="btn-cta w-full !py-3" [disabled]="loading()">
          {{ loading() ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <p class="text-center mt-6 text-sm text-muted">
        No account yet?
        <button class="text-brand-red dark:text-brand-red-light font-semibold hover:underline" (click)="switchToRegister.emit()">Create one</button>
      </p>
    } @else {
      <div class="w-2 h-2 rounded-full bg-gradient-to-r from-brand-red to-brand-gold mb-5"></div>
      <h2 class="font-display text-xl font-bold text-body dark:text-white mb-1">Reset password</h2>
      <p class="text-muted text-sm mb-7">We'll send you a reset link</p>

      @if (forgotMessage()) {
        <div class="bg-green-50 dark:bg-green-900/15 text-green-700 dark:text-green-400 px-4 py-3 rounded-xl text-sm mb-5 border border-green-200 dark:border-green-800/30">{{ forgotMessage() }}</div>
      }

      <form (ngSubmit)="onForgotPassword()">
        <div class="mb-5">
          <label for="forgot-email" class="block text-xs font-semibold text-muted uppercase tracking-wider mb-2">Email</label>
          <input id="forgot-email" type="email" [(ngModel)]="forgotEmail" name="forgotEmail" placeholder="you@company.com" required class="form-input" />
        </div>
        <button type="submit" class="btn-cta w-full !py-3">Send Reset Link</button>
      </form>

      <p class="text-center mt-6 text-sm">
        <button class="text-brand-red dark:text-brand-red-light font-semibold hover:underline" (click)="showForgot.set(false)">&larr; Back to sign in</button>
      </p>
    }
  </div>
</div>
