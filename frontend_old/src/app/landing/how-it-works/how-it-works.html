<section class="py-24 px-6 lg:px-8 bg-surface dark:bg-surface-dark border-t border-border-light dark:border-border-dark">
  <div class="max-w-5xl mx-auto">
    <div class="text-center mb-16">
      <p class="section-label mb-4 justify-center">Process</p>
      <h2 class="font-display text-3xl lg:text-4xl font-bold text-body dark:text-white mb-4">
        Three Steps. Zero Passwords.
      </h2>
      <p class="text-muted text-lg max-w-lg mx-auto leading-relaxed">
        From scan to authentication in under a second.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 md:gap-6 relative">
      <!-- Connecting line (desktop) -->
      <div class="hidden md:block absolute top-10 left-[calc(16.67%+2rem)] right-[calc(16.67%+2rem)] h-px bg-gradient-to-r from-brand-red/30 via-brand-gold/30 to-brand-red/30"></div>

      @for (step of steps; track step.title; let i = $index) {
        <div class="relative text-center">
          <!-- Step number -->
          <div class="relative z-10 w-[4.5rem] h-[4.5rem] mx-auto mb-6 rounded-2xl bg-white dark:bg-surface-dark-elevated border border-border-light dark:border-border-dark shadow-sm flex items-center justify-center">
            <span class="font-display text-2xl font-bold bg-gradient-to-br from-brand-red to-brand-gold bg-clip-text text-transparent">
              {{ i + 1 }}
            </span>
          </div>
          <h3 class="font-display font-bold text-xl text-body dark:text-white mb-2">{{ step.title }}</h3>
          <p class="text-muted text-sm leading-relaxed max-w-[260px] mx-auto">{{ step.desc }}</p>
        </div>
      }
    </div>
  </div>
</section>
