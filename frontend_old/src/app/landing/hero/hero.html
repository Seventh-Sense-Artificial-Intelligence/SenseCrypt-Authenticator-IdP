<section class="relative min-h-screen flex items-center overflow-hidden bg-white dark:bg-dark-bg">
  <!-- Subtle background texture -->
  <img src="images/grybg.jpg" class="absolute inset-0 w-full h-full object-cover opacity-30 dark:opacity-5 pointer-events-none" alt="" />

  <!-- Geometric accent — diagonal cut -->
  <div class="absolute top-0 right-0 w-1/2 h-full bg-surface dark:bg-surface-dark clip-diagonal pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-7xl mx-auto px-6 lg:px-8 pt-28 pb-20">
    <div class="grid lg:grid-cols-2 gap-16 items-center">

      <!-- Left: Content -->
      <div class="animate-on-load">
        <p class="section-label mb-6">Zero-Knowledge Authentication</p>
        <h1 class="font-display text-[2.75rem] lg:text-[3.5rem] xl:text-6xl font-extrabold leading-[1.08] tracking-tight mb-6">
          <span class="text-body dark:text-white">Your Face.</span><br/>
          <span class="bg-gradient-to-r from-brand-red to-brand-gold bg-clip-text text-transparent">Your Key.</span>
        </h1>
        <p class="text-muted text-lg lg:text-xl leading-relaxed max-w-lg mb-10 animate-on-load delay-100">
          Face PKI generates cryptographic keys from your face on-the-fly. Nothing stored. Nothing stolen. Nothing to forget.
        </p>
        <div class="flex flex-wrap gap-4 animate-on-load delay-200">
          <button class="btn-cta !py-3.5 !px-8 !text-sm" (click)="getStarted.emit()">
            Start Free Trial
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
          </button>
          <a href="#features" class="btn-outline-pill !py-3 !px-8 !text-sm">How It Works</a>
        </div>

        <!-- Trust line -->
        <div class="flex items-center gap-6 mt-14 pt-8 border-t border-border-light dark:border-border-dark animate-on-load delay-300">
          <div>
            <p class="font-display text-2xl font-bold text-body dark:text-white">0%</p>
            <p class="text-xs text-muted tracking-wide">Biometrics Stored</p>
          </div>
          <div class="w-px h-10 bg-border-light dark:bg-border-dark"></div>
          <div>
            <p class="font-display text-2xl font-bold text-body dark:text-white">256-bit</p>
            <p class="text-xs text-muted tracking-wide">Encryption Standard</p>
          </div>
          <div class="w-px h-10 bg-border-light dark:bg-border-dark"></div>
          <div>
            <p class="font-display text-2xl font-bold text-body dark:text-white">SOC2</p>
            <p class="text-xs text-muted tracking-wide">Certified</p>
          </div>
        </div>
      </div>

      <!-- Right: Visual -->
      <div class="relative hidden lg:flex items-center justify-center animate-on-load delay-200">
        <!-- Network pattern background -->
        <img src="images/networkg.png" class="absolute w-[120%] opacity-[0.06] dark:opacity-[0.04] pointer-events-none" alt="" />

        <!-- Main visual: solution image -->
        <div class="relative">
          <img src="images/sol01.jpg" alt="Face PKI" class="w-80 h-80 object-cover rounded-3xl shadow-2xl" />
          <!-- Gradient overlay -->
          <div class="absolute inset-0 rounded-3xl bg-gradient-to-t from-brand-red/30 to-transparent"></div>
          <!-- Floating badge -->
          <div class="absolute -bottom-4 -left-4 bg-white dark:bg-surface-dark-elevated rounded-2xl px-5 py-3 shadow-xl border border-border-light dark:border-border-dark">
            <p class="font-display font-bold text-sm text-body dark:text-white">Face PKI</p>
            <p class="text-xs text-muted">Zero-Knowledge Protocol</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
