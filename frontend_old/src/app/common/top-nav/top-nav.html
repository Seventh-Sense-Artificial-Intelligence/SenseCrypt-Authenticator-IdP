<!-- Top accent line -->
<div class="accent-line"></div>
<header class="flex items-center justify-between px-6 bg-white dark:bg-surface-dark-elevated border-b border-border-light dark:border-border-dark" style="height: var(--nav-height);">
  <a routerLink="/dashboard" class="flex items-center gap-2.5">
    <img src="images/Seventh-Sense_Emblem-Knockout.png" alt="" class="h-6 dark:brightness-200" />
    <span class="font-display font-bold text-sm tracking-tight text-body dark:text-white">Seventh Sense</span>
  </a>

  <div class="flex items-center gap-3">
    <button
      class="w-8 h-8 flex items-center justify-center rounded-full border border-border-light dark:border-border-dark text-muted hover:text-body dark:hover:text-white hover:border-brand-red/40 transition-all text-xs"
      (click)="theme.toggle()">
      {{ theme.theme() === 'dark' ? '&#9728;' : '&#9789;' }}
    </button>

    <div class="relative">
      <button class="flex items-center gap-2.5 px-2 py-1.5 rounded-xl hover:bg-surface dark:hover:bg-surface-dark transition-colors" (click)="toggleDropdown()">
        <span class="w-8 h-8 rounded-full bg-gradient-to-br from-brand-red to-brand-gold text-white flex items-center justify-center font-semibold text-xs">
          {{ auth.user()?.full_name?.charAt(0) || 'U' }}
        </span>
        <span class="text-sm font-medium text-body dark:text-white hidden sm:inline">{{ auth.user()?.full_name || 'User' }}</span>
      </button>
      @if (dropdownOpen) {
        <div class="absolute top-full right-0 mt-2 w-44 bg-white dark:bg-surface-dark-elevated border border-border-light dark:border-border-dark rounded-xl shadow-lg overflow-hidden z-50">
          <a class="block px-4 py-2.5 text-sm text-body dark:text-gray-300 hover:bg-surface dark:hover:bg-surface-dark transition-colors" routerLink="/dashboard/profile" (click)="dropdownOpen = false">Profile</a>
          <div class="h-px bg-border-light dark:bg-border-dark mx-3"></div>
          <button class="block w-full text-left px-4 py-2.5 text-sm text-brand-red dark:text-brand-red-light hover:bg-surface dark:hover:bg-surface-dark transition-colors" (click)="logout()">Sign Out</button>
        </div>
      }
    </div>
  </div>
</header>
