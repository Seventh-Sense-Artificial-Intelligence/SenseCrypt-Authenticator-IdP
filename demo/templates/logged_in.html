<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logged In - OIDC Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-zinc-50 flex items-center justify-center p-4">
  <div class="w-full max-w-lg">
    <div class="bg-white rounded-2xl shadow-lg border border-zinc-200 p-8">
      <div class="bg-green-50 text-green-700 px-4 py-3 rounded-xl text-sm border border-green-200 mb-6">
        Authenticated successfully via OIDC
      </div>

      <h2 class="text-lg font-bold text-zinc-900 mb-4">User Info</h2>
      <div class="bg-zinc-50 rounded-xl p-4 mb-6">
        <dl class="space-y-2">
          {% for key, value in userinfo.items() %}
          <div class="flex justify-between text-sm">
            <dt class="font-medium text-zinc-500">{{ key }}</dt>
            <dd class="text-zinc-900 font-mono text-xs">{{ value }}</dd>
          </div>
          {% endfor %}
        </dl>
      </div>

      <h2 class="text-lg font-bold text-zinc-900 mb-4">Tokens Received</h2>
      <div class="bg-zinc-50 rounded-xl p-4 mb-6">
        <dl class="space-y-2">
          {% for key, value in tokens.items() %}
          <div class="flex justify-between text-sm">
            <dt class="font-medium text-zinc-500">{{ key }}</dt>
            <dd class="text-zinc-900 font-mono text-xs break-all">{{ value }}</dd>
          </div>
          {% endfor %}
        </dl>
      </div>

      <a href="/logout"
         class="block w-full py-2.5 px-4 rounded-full text-sm font-semibold text-center uppercase tracking-wider
                border border-zinc-200 text-zinc-600 hover:border-[#B3231D] hover:text-[#B3231D] transition">
        Logout
      </a>
    </div>
  </div>
</body>
</html>
