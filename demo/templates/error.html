<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error - OIDC Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-zinc-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg border border-zinc-200 p-8">
      <div class="bg-red-50 text-red-700 px-4 py-3 rounded-xl text-sm border border-red-200 mb-6">
        Authentication Error
      </div>

      <div class="mb-6">
        <p class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Error Code</p>
        <p class="text-sm font-mono text-zinc-900">{{ error }}</p>
      </div>

      {% if error_description %}
      <div class="mb-6">
        <p class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Description</p>
        <p class="text-sm text-zinc-700">{{ error_description }}</p>
      </div>
      {% endif %}

      <a href="/"
         class="block w-full py-2.5 px-4 rounded-full text-sm font-semibold text-white text-center uppercase tracking-wider
                bg-gradient-to-r from-[#B3231D] to-[#F5A324] hover:opacity-90 transition">
        Try Again
      </a>
    </div>
  </div>
</body>
</html>
