<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OIDC Demo Client</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-zinc-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg border border-zinc-200 p-8">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-gradient-to-br from-[#B3231D] to-[#F5A324] text-white text-2xl font-bold mb-4">S</div>
        <h1 class="text-xl font-bold text-zinc-900">OIDC Demo Client</h1>
        <p class="text-sm text-zinc-500 mt-1">Test login via your Identity Provider</p>
      </div>

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label for="email" class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">Email (optional)</label>
          <input type="email" id="email" name="email" placeholder="you@example.com"
                 class="w-full px-3.5 py-2.5 border border-zinc-200 rounded-xl bg-white text-zinc-900 text-sm outline-none focus:border-[#B3231D] focus:ring-2 focus:ring-[#B3231D]/10 transition">
          <p class="text-xs text-zinc-400 mt-1">Will be sent as login_hint to pre-fill the IdP login</p>
        </div>

        <button type="submit"
                class="w-full py-2.5 px-4 rounded-full text-sm font-semibold text-white uppercase tracking-wider
                       bg-gradient-to-r from-[#B3231D] to-[#F5A324] hover:opacity-90 transition">
          Login with Identity Provider
        </button>
      </form>

      <div class="mt-6 pt-4 border-t border-zinc-100 text-center">
        <p class="text-xs text-zinc-400">Connecting to <span class="font-mono text-zinc-500">{{ issuer_url }}</span></p>
      </div>
    </div>
  </div>
</body>
</html>
